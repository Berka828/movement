<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BxCM Move the Energy</title>
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
</head>
<body>
  <div id="ui">
    <div class="topbar">
      <div class="brand">BxCM Move the Energy</div>

      <div class="controls">
        <label for="cameraSelect">Camera</label>
        <select id="cameraSelect"></select>

        <button id="startBtn">Start</button>
        <button id="burstBtn">Burst</button>
        <button id="resetBtn">Reset</button>
        <button id="debugBtn">Debug: Off</button>
      </div>
    </div>

    <div class="info">
      Staff controls. Press U to show controls again after kiosk mode hides them.
    </div>
  </div>

  <video id="video" playsinline muted autoplay></video>
  <canvas id="canvas"></canvas>

  <script src="app.js"></script>
</body>
</html>
