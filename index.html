<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BxCM Reveal the Logo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <div class="topbar">
      <div class="brand">BxCM Reveal Experience</div>

      <div class="controls">
        <label>Camera</label>
        <select id="cameraSelect"></select>

        <label>Reveal</label>
        <select id="revealTypeSelect">
          <option value="logo">Logo</option>
          <option value="image">Image</option>
          <option value="video">Video</option>
        </select>

        <label>Fog</label>
        <select id="fogStyleSelect">
          <option value="smoke">Smoke</option>
          <option value="dust">Dust</option>
          <option value="frosted">Frosted</option>
        </select>

        <label>Mode</label>
        <select id="modeSelect">
          <option value="AUTO">Auto</option>
          <option value="GLOW">Glow</option>
          <option value="STORM">Storm</option>
          <option value="TWIN">Twin</option>
          <option value="SPACE">Space</option>
        </select>

        <button id="startBtn">Start</button>
        <button id="resetBtn">Reset</button>
        <button id="soundBtn">Sound: Off</button>
        <button id="debugBtn">Debug: Off</button>
      </div>
    </div>

    <div class="info">
      Staff controls. Press <strong>U</strong> to show again after kiosk mode hides them.
    </div>
  </div>

  <video id="video" playsinline muted autoplay></video>
  <canvas id="canvas"></canvas>

  <script src="app.js"></script>
</body>
</html>
